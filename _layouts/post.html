---
layout: default
---

<article class='entry'>
  <header class='entry-header'>
    <h1>{{ page.title | escape }}</h1>
    {% if page.date %}
      <p class='meta'>{{ page.date | date: '%Y-%m-%d' }}</p>
    {% endif %}
  </header>

  <div class='prose'>
    {{ content }}
  </div>

  <p class='back'><a href='{{ '/' | relative_url }}'>← home</a></p>
</article>
